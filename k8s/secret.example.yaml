apiVersion: v1
kind: Secret
metadata:
  name: safety-secrets
type: Opaque
stringData:
  FRONTEND_URL: "https://ehs.example.com"
  JWT_SECRET: "replace-with-secret-manager-value"
  DATABASE_URL: "postgres://safety_app:replace-with-secret@postgres:5432/safety_backend"
  REDIS_URL: "redis://redis:6379"
  BACKUP_ENCRYPTION_KEY: "replace-with-secret-manager-value"
  S3_BUCKET: ""
  S3_REGION: "us-east-1"
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_SECURE: "true"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
  SENTRY_DSN: ""
