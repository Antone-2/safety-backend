apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-backend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safety-backend-api
  template:
    metadata:
      labels:
        app: safety-backend-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/safety-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: safety-backend-config
            - secretRef:
                name: safety-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
