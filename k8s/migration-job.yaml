apiVersion: batch/v1
kind: Job
metadata:
  name: safety-backend-migrate
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrator
          image: ghcr.io/OWNER/safety-backend:latest
          command: ["node", "dist/scripts/startup-check.js", "--migrate"]
          envFrom:
            - configMapRef:
                name: safety-backend-config
            - secretRef:
                name: safety-secrets
